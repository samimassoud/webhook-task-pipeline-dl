version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pipeline_postgres
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline -d pipeline_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  migrate:
    build:
      context: ./app
      target: builder
    command: npm run migrate
    environment:
      DATABASE_URL: postgres://pipeline:pipeline@postgres:5432/pipeline_db
    depends_on:
      postgres:
        condition: service_healthy
  api:
    build: ./app
    container_name: pipeline_api
    command: sh -c "node dist/api/index.js"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://pipeline:pipeline@postgres:5432/pipeline_db
    depends_on:
      - migrate
  worker:
    build: ./app
    container_name: pipeline_worker
    command: sh -c "node dist/worker/index.js"
    environment:
      DATABASE_URL: postgres://pipeline:pipeline@postgres:5432/pipeline_db
    depends_on:
      - migrate

volumes:
  postgres_data:
