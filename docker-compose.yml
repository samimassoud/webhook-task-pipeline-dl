version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pipeline_postgres
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build: ./app
    container_name: pipeline_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://pipeline:pipeline@postgres:5432/pipeline_db
    depends_on:
      - postgres
  worker:
    build: ./app
    container_name: pipeline_worker
    command: sh -c "npm run migrate && node dist/worker/index.js"
    environment:
      DATABASE_URL: postgres://pipeline:pipeline@postgres:5432/pipeline_db
    depends_on:
      - api

volumes:
  postgres_data:
