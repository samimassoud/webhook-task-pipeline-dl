name: CI

on:
    pull_request:
        branches:
            - main
        paths:
            - 'app/src/**'
            - 'app/package.json'
            - 'app/package-lock.json'
            - 'app/Dockerfile'
            - '.github/workflows/ci.yml'

jobs:
    test-and-build:
        name: Lint, Test, Typecheck, Docker Build
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: ./app

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

            - name: Run TypeScript type check
              run: npx tsc --noEmit

            - name: Run Vitest
              run: npm test

            - name: Build Docker image
              run: docker build -t pipeline-app:ci .
